<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas em HTML</title>
</head>

<body>
    <h1>Tabelas em HTML</h1>

    <h2>Catálogo de Roupas</h2>
    <!-- Tabelas são usadas para organizar dados em linhas e colunas -->
    <table>
        <!-- O thead define o cabeçalho da tabela. É uma seção -->
        <thead>
            <!-- O tr = table row. É a linha da tabela -->
            <tr>
                <!-- O th = table header. É uma célula do cabeçalho -->
                <th>Produto</th>
                <th>Preço</th>
                <th>Tamanho</th>
                <th>Quantidade</th>
            </tr>
        </thead>

        <!-- O tbody define o corpo da tabela. -->
        <tbody>
            <tr>
                <!-- O td = table data. É uma célula de dados -->
                <td>Camiseta</td>
                <td>R$50,00</td>
                <td>M</td>
                <td>100</td>
            </tr>

            <tr>
                <td>Calça Jeans</td>
                <td>R$120,00</td>
                <td>42</td>
                <td>60</td>
            </tr>

        </tbody>



        <!-- Lembre-se que a quantidade de células em cada linha deve ser igual -->
    </table>

    <br><br><br>
    <!-- Aperte Ctrl + Espaço e veja a magia acontecer! -->
    table>thead>tr*3>th*5^^tbody>tr*3>td*5

    <!-- Atividade Devquest -->
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Cidade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ana</td>
                <td>25</td>
                <td>São Paulo</td>
            </tr>
            <tr>
                <td>Bruno</td>
                <td>30</td>
                <td>Rio de Janeiro</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
