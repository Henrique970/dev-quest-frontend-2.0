<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequência de Semântica</title>
</head>
<body>
    <h1>Sequência de Semântica</h1>

    <!-- Semântica seria algo como “significado”. Ela se refere ao uso de tags que têm um significado claro e específico sobre o conteúdo que estação representando.- -->

    <!-- Exemplos de tags semânticas no HTML encluem:
        <header> - Renderizar um cabeçalho
        <footer> - Renderizar rodapé
        <article> - Renderizar um conteúdo que funcione sozinho. Um post de blog por exemplo
        <section> - Renderizar uma seção
        <nav> - Renderizar navegação. Muito usada em menus
        <aside> - Renderizar conteúdo lateral -->
    
    <!-- Quando o seu projeto tem semântica, o site de busca como o Google, vai ler melhor seu site, vai entender melhor e vai se posicionar melhor em SEO, para deficientes visuais vai melhorar e os outros desenvolvedores que colocarem as mãos no seu site, vão entender de cara o que ta acontecendo. -->

    <header>
        Cabeçalho
        <nav>Navegação</nav>
    </header>

    <main>Seção principal</main>
    
    <footer>Rodapé</footer>

    <!-- Atividade Devquest -->
    <header>
        <h1>Meu Site</h1>
        <nav>
            <ul>
                <li><a href="">Início</a></li>
                <li><a href="">Sobre</a></li>
                <li><a href="">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <p>Bem-vindo ao conteúdo principal.</p>
        </section>
    </main>

    <footer>
        Todos os direitos reservados.
    </footer>

</body>
</html>
