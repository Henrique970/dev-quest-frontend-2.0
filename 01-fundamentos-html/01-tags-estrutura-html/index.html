<!-- Vai dizer que o documento é HTML5 -->
<!DOCTYPE html>
<!-- A tag html define o idioma do documento. por padrão é en(inglês), mas você pode alterar para pt-BR -->
<html lang="pt-BR">
<!-- O head é como se fosse o pensamento, não conseguimos ver o conteúdo no site -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da página -->
    <title>Tags Estruturais HTML</title>
</head>
<!-- É o corpo do documento, vai aparecer no site -->
<body>
    <!-- Hierarquia de títulos -->
    <h1>Tags Estruturais HTML</h1>

    <!-- Parágrafo de exemplo -->
    <p>Este é um parágrafo de exemplo.</p>

</body>
</html>

<!-- Nunca se esqueça de fechar as tags -->
