<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Essas são as meta tags. Dentro das tags podemos ter vários atributos. -->
    <!-- A meta tag charset define o conjunto de caracteres do documento. E o UTF-8 é o conjunto de caracteres mais comum -->
    <meta charset="UTF-8">
    <!-- A meta tag viewport é usada para controlar o layout em dispositivos móveis. O content define o tamanho da viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- A meta tag description é usada para descrever o conteúdo da página -->
    <meta name="description" content="Esta é uma página de exemplo para demonstrar o uso de meta tags e favicon em HTML.">

    <!-- A meta tag link é usada para vincular recursos externos, como ícones. O rel define o tipo de relacionamento, e o shortcut icon define que vai ser um ícone. O href define o caminho do ícone. O type define o tipo de arquivo do ícone -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <title>Meta Tags e Favicon</title>
</head>

<body>
    <h1>Meta Tags e Favicon</h1>
